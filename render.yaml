services:
  - type: web
    name: mattress-erp-v1
    env: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mattress-erp-db
          property: connectionString
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: SESSION_COOKIE_SECURE
        value: "true"

databases:
  - name: mattress-erp-db
    plan: free
