<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mattress ERP Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#2563EB',
            bg: '#F5F6F8',
            card: '#FFFFFF',
            ink: '#111827',
            line: '#E5E7EB',
            success: '#22C55E',
            warning: '#F59E0B',
            danger: '#EF4444'
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="/static/css/app.css" />
</head>
<body class="bg-bg text-ink" style="font-family: Inter, sans-serif;">
  <div class="flex min-h-screen">
    {% include 'components/sidebar.html' %}
    <div class="flex min-w-0 flex-1 flex-col">
      {% include 'components/navbar.html' %}
      <main class="p-4 lg:p-6">
        <section id="dashboard" class="space-y-4">
          <h1 class="text-[28px] font-bold leading-tight">Dashboard</h1>
          {% include 'components/dashboard_cards.html' %}
          <div class="grid grid-cols-1 gap-4 xl:grid-cols-3">
            <div class="xl:col-span-2 rounded-xl border border-line bg-card p-4 shadow-sm">
              <h3 class="mb-3 text-[20px] font-semibold">Recent Transactions</h3>
              <div id="recentTransactions" class="overflow-hidden rounded-md border border-line bg-white"></div>
            </div>
            <div class="rounded-xl border border-line bg-card p-4 shadow-sm">
              <h3 class="mb-3 text-[20px] font-semibold">Quick Actions</h3>
              <div class="grid grid-cols-1 gap-2 text-sm text-[#6B7280]">
                <div>New Sale</div>
                <div>Add Product</div>
                <div>Add Customer</div>
                <div>New Purchase</div>
                <div>Receive Payment</div>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>
  </div>

  {% include 'components/toast_component.html' %}
  <script src="/static/js/desk.js"></script>
</body>
</html>
